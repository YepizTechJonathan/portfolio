name: Deploy Production
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  packages: write
concurrency:
  group: portfolio-production
  cancel-in-progress: false
jobs:
  build-push-deploy:
    name: Build, push, and deploy Portfolio site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare image metadata
        id: vars
        shell: bash
        run: |
          BASE_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "backend_image_name=${BASE_IMAGE}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image_name=${BASE_IMAGE}/frontend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.vars.outputs.backend_image_name }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.backend_image_name }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.vars.outputs.frontend_image_name }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.frontend_image_name }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Load deployment secrets from Bitwarden
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.SM_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BW_PROD_HOST_ID }} > PROD_HOST
            ${{ vars.BW_PROD_USER_ID }} > PROD_USER
            ${{ vars.BW_PROD_SSH_KEY_ID }} > PROD_SSH_KEY
            ${{ vars.BW_PROD_PORT_ID }} > PROD_PORT
            ${{ vars.BW_PROD_APP_DIR_ID }} > PROD_APP_DIR
            ${{ vars.BW_PROD_PANGOLIN_NETWORK_ID }} > PROD_PANGOLIN_NETWORK
            ${{ vars.BW_GHCR_PAT_ID }} > GHCR_TOKEN
            ${{ vars.BW_PANGOLIN_API_URL_ID }} > PANGOLIN_API_URL
            ${{ vars.BW_PANGOLIN_API_KEY_ID }} > PANGOLIN_API_KEY
            ${{ vars.BW_PANGOLIN_ORG_ID_ID }} > PANGOLIN_ORG_ID
            ${{ vars.BW_PANGOLIN_PROD_SITE_ID_ID }} > PANGOLIN_SITE_ID
      - name: Deploy to IONOS
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          BACKEND_IMAGE_NAME: ${{ steps.vars.outputs.backend_image_name }}
          FRONTEND_IMAGE_NAME: ${{ steps.vars.outputs.frontend_image_name }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -Eeuo pipefail
          : "${PROD_HOST:?Missing PROD_HOST}"
          : "${PROD_USER:?Missing PROD_USER}"
          : "${PROD_SSH_KEY:?Missing PROD_SSH_KEY}"
          : "${PROD_APP_DIR:?Missing PROD_APP_DIR}"
          : "${PROD_PANGOLIN_NETWORK:?Missing PROD_PANGOLIN_NETWORK}"
          PROD_PORT="${PROD_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$PROD_SSH_KEY" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -p "$PROD_PORT" "$PROD_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/production_key -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" "mkdir -p $(printf %q "$PROD_APP_DIR/scripts")"
          scp -i ~/.ssh/production_key -P "$PROD_PORT" docker-compose.prod.yml "$PROD_USER@$PROD_HOST:$PROD_APP_DIR/docker-compose.prod.yml"
          scp -i ~/.ssh/production_key -P "$PROD_PORT" scripts/deploy-prod.sh "$PROD_USER@$PROD_HOST:$PROD_APP_DIR/scripts/deploy-prod.sh"
          REMOTE_CMD="cd $(printf %q "$PROD_APP_DIR") && chmod +x scripts/deploy-prod.sh && BACKEND_IMAGE_NAME=$(printf %q "$BACKEND_IMAGE_NAME") FRONTEND_IMAGE_NAME=$(printf %q "$FRONTEND_IMAGE_NAME") IMAGE_TAG=$(printf %q "$IMAGE_TAG") PANGOLIN_NETWORK=$(printf %q "$PROD_PANGOLIN_NETWORK") GHCR_USERNAME=$(printf %q "$GHCR_USERNAME") GHCR_TOKEN=$(printf %q "$GHCR_TOKEN") ./scripts/deploy-prod.sh"
          ssh -i ~/.ssh/production_key -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" "$REMOTE_CMD"
      - name: Configure Pangolin route
        shell: bash
        env:
          PANGOLIN_SITE_NAME: ${{ vars.PANGOLIN_SITE_NAME }}
          PANGOLIN_RESOURCE_NAME: ${{ vars.PANGOLIN_RESOURCE_NAME }}
          PANGOLIN_RESOURCE_DOMAINS: ${{ vars.PANGOLIN_RESOURCE_DOMAINS }}
          PANGOLIN_TARGET_HOST: portfolio-prod-web
          PANGOLIN_TARGET_PORT: 80
          PANGOLIN_TARGET_METHOD: http
          PANGOLIN_ENABLE_SSL: true
          PANGOLIN_VERIFY_PUBLIC: ${{ vars.PANGOLIN_VERIFY_PUBLIC }}
        run: |
          set -Eeuo pipefail
          if [ -z "${PANGOLIN_API_URL:-}" ] || [ -z "${PANGOLIN_API_KEY:-}" ] || [ -z "${PANGOLIN_ORG_ID:-}" ]; then
            echo "Skipping Pangolin API automation: Bitwarden did not provide PANGOLIN_API_URL, PANGOLIN_API_KEY, and PANGOLIN_ORG_ID."
            exit 0
          fi
          export PANGOLIN_RESOURCE_NAME="${PANGOLIN_RESOURCE_NAME:-Portfolio}"
          export PANGOLIN_RESOURCE_DOMAINS="${PANGOLIN_RESOURCE_DOMAINS:-jonathanyepiz.com,www.jonathanyepiz.com}"
          if [ "${PANGOLIN_VERIFY_PUBLIC:-false}" = "true" ]; then
            python3 scripts/pangolin-upsert-resource.py --verify
          else
            python3 scripts/pangolin-upsert-resource.py
          fi
