name: CI

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  validate:
    name: Validate Portfolio site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose --env-file .env.dev -f docker-compose.dev.yml config --quiet
          PANGOLIN_NETWORK=pangolin docker compose --env-file .env.prod -f docker-compose.prod.yml config --quiet

      - name: Build production stack
        run: docker compose --env-file .env.prod -f docker-compose.prod.yml build
