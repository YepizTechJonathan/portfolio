name: portfolio-dev

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: portfolio-dev-api
    ports:
      - "127.0.0.1:${DEV_BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/src
      - backend-obj:/src/obj
      - backend-bin:/src/bin
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: portfolio-dev-web
    ports:
      - "127.0.0.1:${DEV_FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    networks:
      - app
      - pangolin-dev

volumes:
  backend-obj:
  backend-bin:

networks:
  app:
    driver: bridge
  pangolin-dev:
    external: true
    name: "${DEV_PANGOLIN_NETWORK:-pangolin-dev}"
