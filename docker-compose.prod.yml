name: portfolio-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: portfolio-backend:prod
    container_name: portfolio-prod-api
    restart: unless-stopped
    volumes:
      - db-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: portfolio-frontend:prod
    container_name: portfolio-prod-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app
      - pangolin

volumes:
  db-data:

networks:
  app:
    driver: bridge
  pangolin:
    external: true
    name: "${PANGOLIN_NETWORK:-pangolin}"
