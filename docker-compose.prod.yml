name: portfolio-prod
services:
  backend:
    container_name: portfolio-prod-api
    image: "${BACKEND_IMAGE_NAME:?BACKEND_IMAGE_NAME is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - backend-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - app
  frontend:
    container_name: portfolio-prod-web
    image: "${FRONTEND_IMAGE_NAME:?FRONTEND_IMAGE_NAME is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app
      - pangolin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
volumes:
  backend-data:
networks:
  app:
    driver: bridge
  pangolin:
    external: true
    name: "${PANGOLIN_NETWORK:?PANGOLIN_NETWORK is required}"
